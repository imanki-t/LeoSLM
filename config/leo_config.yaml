# LeoSLM Configuration
# =====================
# All hyperparameters in one place.

model:
  vocab_size:             32768
  max_seq_len:            512
  hidden_dim:             512
  num_layers:             16
  num_heads:              8
  num_kv_heads:           2       # GQA
  num_ect:                4       # epistemic confidence tokens
  ffn_dim:                null    # auto-computed: (8/3 * hidden_dim) → 1408
  gate_temperature:       1.0
  uncertainty_threshold:  0.35
  dropout:                0.0
  weight_tying:           true
  pad_token_id:           0
  mask_token_id:          1
  idk_token_id:           2

training:
  # Phases
  phase1_epochs:          3       # AR only
  phase2_epochs:          3       # diffusion warmup (backbone frozen)
  phase3_epochs:          6       # joint training
  phase4_epochs:          1       # SFT
  phase5_epochs:          1       # DPO

  # Optimizer
  optimizer:              adamw
  lr:                     3.0e-4
  lr_min:                 3.0e-5  # cosine decay minimum
  weight_decay:           0.1
  beta1:                  0.9
  beta2:                  0.95
  grad_clip:              1.0
  warmup_steps:           200

  # Batch size
  batch_size:             8       # real batch per step
  grad_accumulation:      16      # effective batch = 128
  max_seq_len:            512

  # Loss weights
  lambda_mdm:             0.5     # MDM loss weight (phase 3)
  lambda_ect:             0.1     # ECT calibration loss weight
  lambda_const:           0.05    # constitutional loss weight
  lambda_idk:             0.05    # IDK token loss weight (SFT only)

  # DPO
  dpo_beta:               0.1
  dpo_lambda_ect:         0.05

  # Checkpointing
  save_every_steps:       500
  eval_every_steps:       250
  checkpoint_dir:         ./checkpoints

data:
  train_path:             ./data/tinystories_train.npy
  val_path:               ./data/tinystories_val.npy
  tokenizer:              gpt2

  # Pre-tokenization (run once)
  dataset_name:           roneneldan/TinyStories
  max_samples:            null    # null = use all

diffusion:
  num_steps:              16      # inference unmasking steps
  schedule:               cosine
  use_logit_normal:       true    # logit-normal timestep sampling
  schedule_weight:        true    # SUBS weighting

inference:
  temperature:            0.8
  top_k:                  50
  top_p:                  0.9
  consistency_votes:      3
  consistency_threshold:  0.70

# Oracle A1 CPU optimizations
cpu:
  num_threads:            4
  use_compile:            true    # torch.compile (PyTorch 2.x)
  float_precision:        medium  # float32 matmul precision
  pin_memory:             false
  num_workers:            0       # 0 for CPU (no multiprocessing overhead)
