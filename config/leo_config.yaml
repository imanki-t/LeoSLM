# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║              LeoSLM "Aether"  —  FRONTIER CLASS  |  Built by Unmuted        ║
# ╠═══════════════════════════════════════════════════════════════════════════════╣
# ║  Hardware   : Kaggle TPU v5e-8  | 128 GB HBM | ~1,576 TFLOPS BF16          ║
# ║  Model      : ~3.1B total | ~1.9B active (MoE top-2/8) | BF16              ║
# ║  Context    : 32,768 trained | 131,072 via YaRN at inference                ║
# ║  Data       : 2.1B tokens | 6 sources | LeoTokenizer (65,543 vocab)        ║
# ║  Framework  : PyTorch/XLA + xmp.spawn (8 workers) + Adafactor              ║
# ╠═══════════════════════════════════════════════════════════════════════════════╣
# ║  COMPETITION TARGET: Claude Haiku 4.5 / Gemini 2.5 Flash Lite              ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝
#
# NOTE: This file is documentation + leo_rag.py config only.
#       train.py / model code use model/config.py (Python dataclass) directly.
#       All field names here are kept in sync with LeoConfig for clarity.

# ───────────────────────────────────────────────────────────────────────────────
# TOKENIZER — LeoTokenizer (custom BPE, not GPT-2)
# ───────────────────────────────────────────────────────────────────────────────
# FIX: vocab_size was 65536 — wrong. Correct value is 65543.
# prep_data.py trains BPE with base_vocab=65529 (IDs 0..65528), then
# add_special_tokens() appends 14 specials at IDs 65529..65542 → total 65543.
tokenizer:
  type:           bpe
  vocab_size:     65543            # 65529 base BPE + 14 special tokens = 65543
  base_bpe_vocab: 65529            # BpeTrainer target (NO specials in trainer)
  train_data:     ./data/tok_sample.txt
  digit_tokens:   true
  number_tokens:  true
  # Special tokens — appended AFTER BPE training via add_special_tokens()
  # IDs are APPENDED sequentially starting at base_bpe_vocab (65529)
  special_tokens:
    pad:              "[PAD]"          # 65529  ← cfg.pad_id
    unk:              "[UNK]"          # 65530  ← cfg.unk_id (not in LeoConfig but tokenizer needs it)
    bos:              "[BOS]"          # 65531  ← cfg.bos_id
    eos:              "[EOS]"          # 65532  ← cfg.eos_id
    mask:             "[MASK]"         # 65533  ← cfg.mask_id
    idk:              "[IDK]"          # 65534  ← cfg.idk_id
    think_start:      "<think>"        # 65535  ← cfg.think_start_id
    think_end:        "</think>"       # 65536  ← cfg.think_end_id
    tool_call_start:  "<|tool_call|>"  # 65537  ← cfg.tool_call_start
    tool_call_end:    "<|/tool_call|>" # 65538  ← cfg.tool_call_end
    tool_result_start:"<|tool_result|>"# 65539  ← cfg.tool_result_start
    tool_result_end:  "<|/tool_result|>"# 65540 ← cfg.tool_result_end
    system_start:     "<|system|>"     # 65541  ← cfg.system_start
    system_end:       "<|/system|>"    # 65542  ← closing tag

# ───────────────────────────────────────────────────────────────────────────────
# MODEL ARCHITECTURE
# ───────────────────────────────────────────────────────────────────────────────
# ALL field names below match model/config.py LeoConfig dataclass exactly.
model:
  name:    LeoSLM-Aether
  version: aether
  creator: Unmuted

  # Special token IDs — must match tokenizer section above
  pad_id:            65529
  bos_id:            65531
  eos_id:            65532
  mask_id:           65533
  idk_id:            65534
  think_start_id:    65535
  think_end_id:      65536
  tool_call_start:   65537
  tool_call_end:     65538
  tool_result_start: 65539
  tool_result_end:   65540
  system_start:      65541
  estr_domain_count: 8

  vocab_size:   65543          # = 65529 base + 14 specials

  # ── Sequence ──────────────────────────────────────────────────────────────────
  max_seq_len:       32768
  chunk_size:        2048
  think_budget_max:  8192
  think_budget_min:  256

  # ── Core dimensions ───────────────────────────────────────────────────────────
  hidden_dim:       2560
  num_layers:       32
  num_dense_layers: 4
  num_heads:        20
  head_dim:         128        # hidden_dim / num_heads = 128 ✓

  # ── Multi-Head Latent Attention (MLA) ─────────────────────────────────────────
  use_mla:      true
  mla_c_kv:     512
  mla_c_q:      768
  mla_rope_dim: 64

  # ── Hybrid attention: Sliding Window + Global ─────────────────────────────────
  # FIX: was sliding_window_size — correct field name is sliding_window
  sliding_window: 4096         # local layers attend ±4096 tokens
  global_every_n: 4            # every 4th layer is global (layers 3,7,11,...31)

  # ── GQA fallback ──────────────────────────────────────────────────────────────
  num_kv_heads: 4

  # ── FFN dimensions ────────────────────────────────────────────────────────────
  ffn_dim_dense:  6912
  ffn_dim_expert: 1024

  # ── Mixture of Experts (UWMR) ─────────────────────────────────────────────────
  # FIX: moe_num_experts → moe_experts, moe_shared_experts → moe_shared
  moe_experts:   8             # total expert count
  moe_top_k:     2             # active experts per token
  moe_shared:    1             # always-active shared expert (DeepSeek-style)
  moe_load_coeff: 0.01

  # FIX: uwmr_specialist_scale → uwmr_spec_scale, uwmr_generalist_scale → uwmr_gen_scale
  uwmr_spec_scale: 2.0         # routing bias for high-U (uncertain) tokens
  uwmr_gen_scale:  1.0         # routing bias for low-U (confident) tokens

  # ── ECT v3 ────────────────────────────────────────────────────────────────────
  num_ect:   8
  ect_heads: 4
  # FIX: ect_max_total → ect_max, ect_spawn_threshold → ect_spawn_thresh
  ect_max:          16
  ect_spawn_thresh: 0.60

  # ── Deep Think Mode ───────────────────────────────────────────────────────────
  deep_think:
    enabled:               true
    auto_think_threshold:  0.50
    grpo_format_reward:    1.0
    grpo_accuracy_reward:  2.0
    grpo_factuality_reward: 1.5
    grpo_length_penalty:   0.001
    use_prm:               true
    prm_hidden:            256

  # ── EPE ───────────────────────────────────────────────────────────────────────
  use_epe:       true
  epe_min_scale: 0.7
  epe_max_scale: 1.8

  # ── YaRN ──────────────────────────────────────────────────────────────────────
  use_yarn:  true
  yarn_scale: 1.0              # set >1.0 at inference for extended context
  yarn:
    scale_factor: 4.0          # 32k × 4 = 128k at inference
    beta_fast:    32
    beta_slow:    1
    mscale:       0.1

  # ── MTP ───────────────────────────────────────────────────────────────────────
  use_mtp:         true
  mtp_n:           4
  mtp_head_layers: 1

  # ── DSA ───────────────────────────────────────────────────────────────────────
  use_dsa:       true
  dsa_threshold: 32768
  dsa_top_k_pct: 0.25

  # ── ACGI ──────────────────────────────────────────────────────────────────────
  acgi_threshold:    0.72

  # ── SAM ───────────────────────────────────────────────────────────────────────
  use_sam:         true
  sam_memory_size: 32

  # ── TDM ───────────────────────────────────────────────────────────────────────
  use_tdm:             true
  tdm_memory_size:     64
  tdm_conf_threshold:  0.20
  cmg_threshold:       0.7

  # ── TTIP ──────────────────────────────────────────────────────────────────────
  use_ttip: true

  # ── PRM ───────────────────────────────────────────────────────────────────────
  use_prm:    true
  prm_hidden: 256

  # ── CUR ───────────────────────────────────────────────────────────────────────
  use_cur:       true
  cur_max_passes: 3
  cur_threshold:  0.05

  # ── Uncertainty threshold ──────────────────────────────────────────────────────
  # FIX: was uncertainty_threshold: 0.35 — WRONG NAME AND VALUE
  # Correct field name: uncertainty_thresh, correct value: 0.50
  uncertainty_thresh: 0.50

  # ── Gradient checkpointing ────────────────────────────────────────────────────
  # Enabled via --grad_ckpt flag in train.py (reduces HBM ~70%)
  use_gradient_checkpointing: false   # set true via --grad_ckpt CLI flag

# ───────────────────────────────────────────────────────────────────────────────
# ANTI-HALLUCINATION STACK
# ───────────────────────────────────────────────────────────────────────────────
anti_hallucination:
  ect_brier_calibration:      true
  idk_token_training:         true
  constitutional_diffusion:   true
  confidence_gate_alpha:      true
  epistemic_pos_encoding:     true
  factuality_dpo:             true
  grpo_factuality:            true
  self_consistency_voting:    true
  idk_sft_data:               true
  cascade_uncertainty_res:    true
  constitutional_memory_gate: true
  contrastive_decoding:       true
  prm_step_reward:            true
  atomic_claim_verification:  true

# ───────────────────────────────────────────────────────────────────────────────
# TRAINING — 8 phases
# ───────────────────────────────────────────────────────────────────────────────
training:
  # Phase schedule (matches train.py PHASE_CFG exactly)
  # Phase 1: AR warmup          4k ctx
  # Phase 2: Diffusion          8k ctx
  # Phase 3: Full MoE+ECT+MTP  16k ctx
  # Phase 4: SFT alignment     32k ctx
  # Phase 5: Factuality DPO    32k ctx
  # Phase 6: GRPO Think RL     32k ctx
  # Phase 7: Agentic SFT       32k ctx
  # Phase 8: Agentic RL        32k ctx
  phase1_epochs: 2
  phase2_epochs: 2
  phase3_epochs: 2
  phase4_epochs: 2
  phase5_epochs: 1
  phase6_epochs: 2
  phase7_epochs: 2
  phase8_epochs: 2

  phase_contexts: [4096, 8192, 16384, 32768, 32768, 32768, 32768, 32768]
  phase_tau:      [0.50,  0.45,  0.40,  0.35,  0.35,  0.30,  0.30,  0.28]

  # ── Optimizer ──────────────────────────────────────────────────────────────────
  optimizer:     adafactor
  lr:            1.0e-3
  lr_min:        1.0e-4
  weight_decay:  0.1
  grad_clip:     1.0
  warmup_steps:  1000

  # ── Batch ──────────────────────────────────────────────────────────────────────
  # Memory per chip at 32k context with xmp.spawn + grad checkpointing:
  #   Params BF16:           3.1B × 2B           ≈  6.2 GB
  #   Adafactor 2nd moment:  row-factored         ≈  1.5 GB
  #   Activations (ckpt):                        ≈  1.2 GB
  #   XLA workspace:                             ≈  1.0 GB
  #   ─────────────────────────────────────────────────────
  #   Total:                                     ≈  9.9 GB / 16 GB  ✓
  batch_size:       1      # 1 full sequence per chip per step
  grad_accumulation: 16   # effective batch: 1 × 16 × 8 chips = 128 sequences

  # ── Memory ──────────────────────────────────────────────────────────────────────
  mixed_precision:         true    # BF16 (TPU native)
  gradient_checkpointing:  true    # per-block recompute, enabled via --grad_ckpt
  # FIX: use_fsdp was true — FSDP was root cause of hlo_verifier crash
  # Now using xmp.spawn (8 workers, one per chip) with xm.optimizer_step
  use_fsdp:  false
  use_spmd:  false

  # ── Loss weights ─────────────────────────────────────────────────────────────
  # Field names match training/loss.py LeoLoss exactly
  loss_w_ect:  0.10
  loss_w_moe:  0.01
  loss_w_idk:  0.10
  loss_w_ses:  0.01
  loss_w_mtp:  0.30
  loss_w_prm:  0.05
  loss_w_acgi: 0.10
  loss_w_msra: 0.05

  # ── GRPO (Phase 6) ────────────────────────────────────────────────────────────
  grpo:
    n_samples:    8
    kl_coeff:     0.001
    clip_high:    0.2
    clip_low:     0.0
    temperature:  1.0
    reward_model: rule

  # ── Checkpointing ─────────────────────────────────────────────────────────────
  save_every_steps: 200
  eval_every_steps: 200
  checkpoint_dir:   ./checkpoints

# ───────────────────────────────────────────────────────────────────────────────
# DATA
# ───────────────────────────────────────────────────────────────────────────────
data:
  train_path: ./data/train.npy
  val_path:   ./data/val.npy
  tok_path:   ./data/tok_sample.txt
  dtype:      uint32             # uint32 required: vocab IDs up to 65543 > uint16 max
  tokenizer:  ./leo_tokenizer/

  sources:
    fineweb_edu:   700_000_000
    finemath:      300_000_000
    the_stack:     400_000_000
    open_web_math: 200_000_000
    dolma_books:   300_000_000
    dolma_wiki:    200_000_000
  total_tokens: 2_100_000_000

# ───────────────────────────────────────────────────────────────────────────────
# INFERENCE
# ───────────────────────────────────────────────────────────────────────────────
inference:
  temperature:  0.8
  top_k:        50
  top_p:        0.9

  default_mode:      auto
  think_trigger:     "/think"
  nothink_trigger:   "/nothink"

  use_yarn:     true
  yarn_max_len: 131072           # 128k tokens at inference via YaRN ×4

  use_cur:         true
  cur_max_passes:  3
  cur_threshold:   0.05

  use_tdm:         true
  tdm_memory_size: 64
  tdm_threshold:   0.20

  use_kv_cache:       true
  kv_evict_uncertain: true
  kv_max_length:      32768

  use_ect_spawn:    true
  ect_spawn_thresh: 0.60

  use_contrastive:   false
  contrastive_alpha: 0.1

  consistency_votes:  3
  consistency_thresh: 0.70

# ───────────────────────────────────────────────────────────────────────────────
# TPU v5e-8 HARDWARE
# ───────────────────────────────────────────────────────────────────────────────
# FIX: use_fsdp removed, XLA_FLAGS GPU flag removed
tpu:
  num_chips:       8
  hbm_per_chip_gb: 16
  total_hbm_gb:    128
  tflops_bf16:     1576
  dtype:           bfloat16
  framework:       pytorch_xla
  training_mode:   xmp_spawn    # xmp.spawn(8 workers) — correct Kaggle TPU pattern
  use_fsdp:        false        # FIX: was true — caused hlo_verifier crash
  use_compile:     false        # XLA JIT handles compilation natively
  xla_jit:         true
  num_workers:     0            # must be 0 on Kaggle TPU (fork issues)
  env:
    PJRT_DEVICE:                  "TPU"
    XLA_TENSOR_ALLOCATOR_MAXSIZE: "1000000000"
    TF_CPP_MIN_LOG_LEVEL:         "3"
    # FIX: removed XLA_FLAGS --xla_gpu_enable_triton_gemm (GPU-only flag, wrong on TPU)
    # FIX: removed XLA_USE_BF16 (deprecated, model uses .to(torch.bfloat16) instead)

# ───────────────────────────────────────────────────────────────────────────────
# LEO IDENTITY
# ───────────────────────────────────────────────────────────────────────────────
identity:
  name:      Leo
  full_name: Leo Aether
  creator:   Unmuted
  version:   aether
  description: >
    Leo is a small language model built by Unmuted.
    Leo uses a Confidence-Gated Diffusion-AR Transformer architecture with
    Epistemic Confidence Tokens that architecturally constrain hallucination.
    Leo can think step-by-step, call tools, search the web, and use MCP servers.
    Leo was trained on 2.1B tokens across education, math, code, books, and Wikipedia.
  personality: >
    Direct, honest, curious, and calibrated.
    Leo acknowledges uncertainty rather than confabulating.
    Leo enjoys reasoning inside its think blocks.
    Leo knows it was built by Unmuted and says so.
  system_prompt: >
    You are Leo, a language model built by Unmuted. Your full name is Leo Aether.
    You have approximately 3.1 billion parameters and were trained on 2.1 billion tokens.
    You use a Confidence-Gated Diffusion-AR Transformer with Epistemic Confidence Tokens.
    You can call tools including web search, code execution, and MCP servers.
    When uncertain, say so or use your think mode. Never claim to be GPT, Claude, or Gemini.

# ───────────────────────────────────────────────────────────────────────────────
# EXTERNAL KNOWLEDGE + RAG + CUSTOM INSTRUCTIONS
# ───────────────────────────────────────────────────────────────────────────────
external_knowledge:
  enabled: false       # flip to true after training to activate RAG / tools

  custom_instructions:
    enabled: false
    path:    ./knowledge/instructions.txt
    inline:  null

  rag:
    enabled:     false
    backend:     chroma
    index_path:  ./knowledge/index/
    collection:  leo_knowledge
    top_k:       5
    max_tokens:  2048
    similarity:  cosine
    embed_model: sentence-transformers/all-MiniLM-L6-v2
    api_url:     null
    api_key:     null

  document_store:
    enabled:        false
    source_dir:     ./knowledge/documents/
    chunk_size:     512
    chunk_overlap:  64
    supported_types: [pdf, txt, md, html, docx, json, csv]

  mcp_servers:
    - name: web_search
      enabled: false
      url:  null
      auth: null
    - name: code_exec
      enabled: false
      url:  null
      auth: null
    - name: file_io
      enabled: false
      url:  null
      auth: null
    - name: custom
      enabled: false
      url:  null
      auth: null

  custom_functions:
    enabled:  false
    registry: ./knowledge/functions.json
