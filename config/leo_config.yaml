# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║              LeoSLM "Aether"  —  1B CLASS  |  Built by Unmuted              ║
# ╠═══════════════════════════════════════════════════════════════════════════════╣
# ║  Hardware   : Kaggle TPU v5e-8  | 128 GB HBM | ~1,576 TFLOPS BF16          ║
# ║  Model      : ~950M total | ~220M active (MoE top-2/8) | BF16              ║
# ║  Context    : 32,768 trained | 131,072 via YaRN at inference                ║
# ║  Data       : 2B tokens | 6 sources | LeoTokenizer (65,543 vocab)          ║
# ║  Framework  : PyTorch/XLA + xmp.spawn (8 workers) + Adafactor              ║
# ╠═══════════════════════════════════════════════════════════════════════════════╣
# ║  WHY 1B NOT 3.1B:                                                            ║
# ║  Chinchilla optimal ratio = 20 tokens/param.                                ║
# ║  2B tokens → optimal model = 100M params (inference-optimal).               ║
# ║  1B model on 2B tokens = 2 tok/param — undertrained but functional.         ║
# ║  3.1B on 2B tokens = 0.65 tok/param — severely undertrained, won't converge.║
# ║  A 1B model also trains faster, has a 1.9GB checkpoint, and runs on 8GB GPU.║
# ╠═══════════════════════════════════════════════════════════════════════════════╣
# ║  DISK BUDGET (19.5 GB limit):                                                ║
# ║  tokens_tmp.bin during prep:    8.00 GB                                      ║
# ║  train.npy (peak overlap):      7.76 GB  →  peak total: 15.76 GB ✓          ║
# ║  val.npy:                       0.24 GB                                      ║
# ║  checkpoint (1B BF16):          1.90 GB                                      ║
# ║  code + tokenizer:              0.35 GB                                      ║
# ║  Total at training:            10.25 GB  →  9.25 GB headroom ✓              ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝
#
# NOTE: This file is documentation + leo_rag.py config only.
# train.py and model code read model/config.py directly.
# All field names here match LeoConfig dataclass exactly.

# ───────────────────────────────────────────────────────────────────────────────
# TOKENIZER
# ───────────────────────────────────────────────────────────────────────────────
# WHY 65k NOT 256k for a 1B model:
# 256k vocab → embedding table = 256000 × 1792 = 459M params = 48% of model budget
# 65k vocab  → embedding table =  65543 × 1792 = 117M params = 12% of model budget
# At 1B scale, wasting half the params on lookup tables is a bad trade.
# 256k vocab makes sense at 7B+ where the embedding is a smaller fraction.
tokenizer:
  type:           bpe
  vocab_size:     65543          # 65529 base BPE + 14 specials = 65543
  base_bpe_vocab: 65529
  train_data:     ./data/tok_sample.txt
  digit_tokens:   true
  number_tokens:  true
  special_tokens:
    pad:              "[PAD]"           # 65529  ← cfg.pad_id
    unk:              "[UNK]"           # 65530
    bos:              "[BOS]"           # 65531  ← cfg.bos_id
    eos:              "[EOS]"           # 65532  ← cfg.eos_id
    mask:             "[MASK]"          # 65533  ← cfg.mask_id
    idk:              "[IDK]"           # 65534  ← cfg.idk_id
    think_start:      "<think>"         # 65535  ← cfg.think_start_id
    think_end:        "</think>"        # 65536  ← cfg.think_end_id
    tool_call_start:  "<|tool_call|>"   # 65537  ← cfg.tool_call_start
    tool_call_end:    "<|/tool_call|>"  # 65538  ← cfg.tool_call_end
    tool_result_start:"<|tool_result|>" # 65539  ← cfg.tool_result_start
    tool_result_end:  "<|/tool_result|>"# 65540  ← cfg.tool_result_end
    system_start:     "<|system|>"      # 65541  ← cfg.system_start
    system_end:       "<|/system|>"     # 65542

# ───────────────────────────────────────────────────────────────────────────────
# MODEL ARCHITECTURE  (~1B params)
# ───────────────────────────────────────────────────────────────────────────────
model:
  name:    LeoSLM-Aether-1B
  version: aether
  creator: Unmuted

  # Special token IDs (unchanged from 65k tokenizer)
  pad_id:            65529
  bos_id:            65531
  eos_id:            65532
  mask_id:           65533
  idk_id:            65534
  think_start_id:    65535
  think_end_id:      65536
  tool_call_start:   65537
  tool_call_end:     65538
  tool_result_start: 65539
  tool_result_end:   65540
  system_start:      65541
  estr_domain_count: 8

  vocab_size:   65543

  # ── Sequence ──────────────────────────────────────────────────────────────
  max_seq_len:       32768
  chunk_size:        2048
  think_budget_max:  8192
  think_budget_min:  256

  # ── Core dimensions (REDUCED from 3.1B → ~1B) ────────────────────────────
  # Key constraint: hidden_dim must be divisible by num_heads
  # 1792 / 14 = 128 (head_dim) ✓
  hidden_dim:       1792   # was 2560
  num_layers:       24     # was 32
  num_dense_layers: 2      # was 4
  num_heads:        14     # was 20
  head_dim:         128    # unchanged — 1792/14 = 128 exactly

  # ── MLA (REDUCED) ────────────────────────────────────────────────────────
  use_mla:      true
  mla_c_kv:     384         # was 512
  mla_c_q:      512         # was 768
  mla_rope_dim: 64          # unchanged

  # ── Hybrid attention ──────────────────────────────────────────────────────
  sliding_window: 4096
  global_every_n: 4

  # ── GQA fallback ──────────────────────────────────────────────────────────
  num_kv_heads: 4

  # ── FFN (REDUCED) ─────────────────────────────────────────────────────────
  ffn_dim_dense:  4864      # was 6912  (≈ 8/3 × 1792, aligned to 64)
  ffn_dim_expert: 512       # was 1024

  # ── MoE ───────────────────────────────────────────────────────────────────
  moe_experts:    8         # unchanged
  moe_top_k:      2         # unchanged
  moe_shared:     1         # unchanged
  moe_load_coeff: 0.01
  uwmr_spec_scale: 2.0
  uwmr_gen_scale:  1.0

  # ── ECT (REDUCED) ────────────────────────────────────────────────────────
  num_ect:          6       # was 8
  ect_heads:        4
  ect_max:          12      # was 16
  ect_spawn_thresh: 0.60

  # ── ACGI ──────────────────────────────────────────────────────────────────
  acgi_threshold:    0.72

  # ── EPE ───────────────────────────────────────────────────────────────────
  use_epe:       true
  epe_min_scale: 0.7
  epe_max_scale: 1.8

  # ── YaRN ──────────────────────────────────────────────────────────────────
  use_yarn:   true
  yarn_scale: 1.0
  yarn:
    scale_factor: 4.0
    beta_fast:    32
    beta_slow:    1
    mscale:       0.1

  # ── MTP (REDUCED) ────────────────────────────────────────────────────────
  use_mtp:         true
  mtp_n:           3        # was 4
  mtp_head_layers: 1

  # ── DSA ───────────────────────────────────────────────────────────────────
  use_dsa:       true
  dsa_threshold: 32768
  dsa_top_k_pct: 0.25

  # ── SAM (REDUCED) ────────────────────────────────────────────────────────
  use_sam:         true
  sam_memory_size: 16       # was 32

  # ── TDM (REDUCED) ────────────────────────────────────────────────────────
  use_tdm:             true
  tdm_memory_size:     32   # was 64
  tdm_conf_threshold:  0.20
  cmg_threshold:       0.7

  # ── PRM (REDUCED head) ────────────────────────────────────────────────────
  use_prm:    true
  prm_hidden: 128           # was 256

  # ── CUR ───────────────────────────────────────────────────────────────────
  use_cur:        true
  cur_max_passes: 3
  cur_threshold:  0.05

  # ── TTIP ──────────────────────────────────────────────────────────────────
  use_ttip: true

  # ── Uncertainty ───────────────────────────────────────────────────────────
  uncertainty_thresh: 0.50

  # ── Loss weights ─────────────────────────────────────────────────────────
  loss_w_ect:  0.10
  loss_w_moe:  0.01
  loss_w_idk:  0.10
  loss_w_ses:  0.01
  loss_w_mtp:  0.30
  loss_w_prm:  0.05
  loss_w_acgi: 0.10
  loss_w_msra: 0.05

# ───────────────────────────────────────────────────────────────────────────────
# ANTI-HALLUCINATION STACK
# ───────────────────────────────────────────────────────────────────────────────
anti_hallucination:
  ect_brier_calibration:      true
  idk_token_training:         true
  constitutional_diffusion:   true
  confidence_gate_alpha:      true
  epistemic_pos_encoding:     true
  factuality_dpo:             true
  grpo_factuality:            true
  self_consistency_voting:    true
  idk_sft_data:               true
  cascade_uncertainty_res:    true
  constitutional_memory_gate: true
  contrastive_decoding:       true
  prm_step_reward:            true
  atomic_claim_verification:  true

# ───────────────────────────────────────────────────────────────────────────────
# TRAINING — 8 phases
# ───────────────────────────────────────────────────────────────────────────────
training:
  phase1_epochs: 2
  phase2_epochs: 2
  phase3_epochs: 2
  phase4_epochs: 2
  phase5_epochs: 1
  phase6_epochs: 2
  phase7_epochs: 2
  phase8_epochs: 2

  phase_contexts: [4096, 8192, 16384, 32768, 32768, 32768, 32768, 32768]
  phase_tau:      [0.50,  0.45,  0.40,  0.35,  0.35,  0.30,  0.30,  0.28]

  optimizer:     adafactor
  lr:            1.2e-3      # slightly higher LR for smaller model
  lr_min:        1.2e-4
  weight_decay:  0.1
  grad_clip:     1.0
  warmup_steps:  1000

  # Memory at 32k context with 1B model + grad checkpointing:
  #   Params BF16:           1B × 2B     ≈  2.0 GB/chip
  #   Adafactor moments:     row-factored ≈  0.8 GB/chip
  #   Activations (ckpt):                ≈  0.6 GB/chip
  #   XLA workspace:                     ≈  1.0 GB/chip
  #   ──────────────────────────────────────────────────
  #   Total:                             ≈  4.4 GB / 16 GB  ✓ (28% utilisation)
  batch_size:       1
  grad_accumulation: 16      # effective batch = 1 × 16 × 8 chips = 128 seqs

  mixed_precision:         true
  gradient_checkpointing:  true
  use_fsdp:                false   # xmp.spawn handles distribution
  use_spmd:                false

  loss_w_ect:  0.10
  loss_w_moe:  0.01
  loss_w_idk:  0.10
  loss_w_ses:  0.01
  loss_w_mtp:  0.30
  loss_w_prm:  0.05
  loss_w_acgi: 0.10
  loss_w_msra: 0.05

  grpo:
    n_samples:    8
    kl_coeff:     0.001
    clip_high:    0.2
    clip_low:     0.0
    temperature:  1.0
    reward_model: rule

  save_every_steps: 200
  eval_every_steps: 200
  checkpoint_dir:   ./checkpoints

# ───────────────────────────────────────────────────────────────────────────────
# DATA  —  2B tokens
# ───────────────────────────────────────────────────────────────────────────────
# Token/param ratio: 2B / 1B = 2 tok/param
# Chinchilla optimal would be 20B tokens for 1B params.
# 2 tok/param = undertrained but produces a functional, useful model.
# (LLaMA, Phi, Mistral all "overtrain" small models well past Chinchilla.)
data:
  train_path: ./data/train.npy
  val_path:   ./data/val.npy
  tok_path:   ./data/tok_sample.txt
  dtype:      uint32
  tokenizer:  ./leo_tokenizer/

  sources:
    fineweb_edu:   1_200_000_000   # 60%
    finemath:        300_000_000   # 15%
    the_stack:       260_000_000   # 13%
    open_web_math:   120_000_000   #  6%
    dolma_books:      80_000_000   #  4%
    dolma_wiki:       40_000_000   #  2%
  total_tokens: 2_000_000_000

# ───────────────────────────────────────────────────────────────────────────────
# INFERENCE
# ───────────────────────────────────────────────────────────────────────────────
inference:
  temperature:  0.8
  top_k:        50
  top_p:        0.9
  default_mode:      auto
  think_trigger:     "/think"
  nothink_trigger:   "/nothink"
  use_yarn:     true
  yarn_max_len: 131072
  use_cur:         true
  cur_max_passes:  3
  cur_threshold:   0.05
  use_tdm:         true
  tdm_memory_size: 32
  tdm_threshold:   0.20
  use_kv_cache:       true
  kv_evict_uncertain: true
  kv_max_length:      32768
  use_ect_spawn:    true
  ect_spawn_thresh: 0.60
  use_contrastive:   false
  contrastive_alpha: 0.1
  consistency_votes:  3
  consistency_thresh: 0.70

# ───────────────────────────────────────────────────────────────────────────────
# TPU v5e-8
# ───────────────────────────────────────────────────────────────────────────────
tpu:
  num_chips:       8
  hbm_per_chip_gb: 16
  total_hbm_gb:    128
  tflops_bf16:     1576
  dtype:           bfloat16
  framework:       pytorch_xla
  training_mode:   torch_xla.launch
  use_fsdp:        false
  use_compile:     false
  xla_jit:         true
  num_workers:     0
  env:
    PJRT_DEVICE:                  "TPU"
    XLA_TENSOR_ALLOCATOR_MAXSIZE: "1000000000"
    TF_CPP_MIN_LOG_LEVEL:         "3"

# ───────────────────────────────────────────────────────────────────────────────
# IDENTITY
# ───────────────────────────────────────────────────────────────────────────────
identity:
  name:      Leo
  full_name: Leo Aether
  creator:   Unmuted
  version:   aether-1b
  system_prompt: >
    You are Leo, a language model built by Unmuted. Your full name is Leo Aether.
    You have approximately 1 billion parameters and were trained on 2 billion tokens.
    You use a Confidence-Gated Diffusion-AR Transformer with Epistemic Confidence Tokens.
    You can call tools including web search, code execution, and MCP servers.
    When uncertain, say so or use your think mode. Never claim to be GPT, Claude, or Gemini.

# ───────────────────────────────────────────────────────────────────────────────
# EXTERNAL KNOWLEDGE
# ───────────────────────────────────────────────────────────────────────────────
external_knowledge:
  enabled: false
  custom_instructions:
    enabled: false
    path:    ./knowledge/instructions.txt
    inline:  null
  rag:
    enabled:     false
    backend:     chroma
    index_path:  ./knowledge/index/
    collection:  leo_knowledge
    top_k:       5
    max_tokens:  2048
    embed_model: sentence-transformers/all-MiniLM-L6-v2
    api_url:     null
    api_key:     null
  document_store:
    enabled:        false
    source_dir:     ./knowledge/documents/
    chunk_size:     512
    chunk_overlap:  64
    supported_types: [pdf, txt, md, html, docx, json, csv]
  mcp_servers:
    - name: web_search
      enabled: false
      url:  null
      auth: null
    - name: code_exec
      enabled: false
      url:  null
      auth: null
    - name: file_io
      enabled: false
      url:  null
      auth: null
    - name: custom
      enabled: false
      url:  null
      auth: null
  custom_functions:
    enabled:  false
    registry: ./knowledge/functions.json
