# LeoSLM Configuration
# =====================
# All hyperparameters in one place.

model:
  vocab_size:             50260   # GPT-2 + 3 special tokens (PAD, MASK, IDK)
  max_seq_len:            2048    # Long context — matches FineWeb-Edu article length
  hidden_dim:             512
  num_layers:             16
  num_heads:              8
  num_kv_heads:           2       # GQA — saves memory at 2048 context
  num_ect:                4       # Epistemic Confidence Tokens
  ffn_dim:                null    # Auto-computed: (8/3 * hidden_dim) = 1408
  gate_temperature:       1.0
  uncertainty_threshold:  0.35
  dropout:                0.0
  weight_tying:           true
  pad_token_id:           50257
  mask_token_id:          50258
  idk_token_id:           50259

training:
  # Phases
  phase1_epochs:          3       # AR warmup only
  phase2_epochs:          3       # Diffusion warmup (backbone frozen)
  phase3_epochs:          6       # Full joint training

  # Optimizer
  optimizer:              adamw
  lr:                     3.0e-4
  lr_min:                 3.0e-5  # Cosine decay floor
  weight_decay:           0.1
  beta1:                  0.9
  beta2:                  0.95
  grad_clip:              1.0
  warmup_steps:           200

  # Batch — tuned for T4 x2 GPU at 2048 context
  batch_size:             4       # Reduced from 8 — prevents OOM at 2048 context
  grad_accumulation:      32      # Increased from 16 — keeps effective batch at 128
  max_seq_len:            2048    # Must match model.max_seq_len

  # Loss weights
  lambda_mdm:             0.5     # MDM loss weight (phase 3)
  lambda_ect:             0.1     # ECT calibration loss weight
  lambda_const:           0.05    # Constitutional loss weight
  lambda_idk:             0.05    # IDK token loss weight

  # DPO
  dpo_beta:               0.1
  dpo_lambda_ect:         0.05

  # Checkpointing — every 200 steps so session crashes lose minimal progress
  save_every_steps:       200
  eval_every_steps:       250
  checkpoint_dir:         ./checkpoints

data:
  train_path:             ./data/train.npy
  val_path:               ./data/val.npy
  tokenizer:              gpt2
  dataset_name:           HuggingFaceFW/fineweb-edu
  max_tokens:             50000000  # 50M tokens streamed — fits Kaggle storage
  max_doc_length:         2048      # Match model context — full articles

diffusion:
  num_steps:              16      # Inference unmasking steps
  schedule:               cosine
  use_logit_normal:       true    # Logit-normal timestep sampling
  schedule_weight:        true    # SUBS weighting

inference:
  temperature:            0.8
  top_k:                  50
  top_p:                  0.9
  consistency_votes:      3
  consistency_threshold:  0.70

# Kaggle GPU optimizations
gpu:
  use_compile:            true    # torch.compile (PyTorch 2.x)
  float_precision:        medium  # Faster matmul on T4
  pin_memory:             true    # Faster CPU→GPU transfer
  num_workers:            2       # Parallel data loading
